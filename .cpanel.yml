---
deployment:
  tasks:
    - export DEPLOYPATH=/home/pallo/public_html/RCMail

    # Pull latest code from GitHub repo
    - /usr/bin/git clone https://github.com/mpallo1/RCMail.git $DEPLOYPATH

    # Or if repo already exists, use pull instead
    # - cd $DEPLOYPATH && /usr/bin/git pull origin main

    # Optional: install dependencies if Node.js project
    # - cd $DEPLOYPATH && npm install

    # Optional: install dependencies if Python project
    # - cd $DEPLOYPATH && pip install -r requirements.txt

    # Set proper permissions (optional)
    - /bin/chmod -R 755 $DEPLOYPATH